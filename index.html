<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fortune City</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#0D1B2A;--gold:#FFD166;--coral:#EF476F;--mint:#06D6A0;
    --purple:#7B2FBE;--cream:#FFFBF0;--dark:#060E18;
    --blue:#118AB2;--orange:#FF9A3C;
  }
  body{
    background:var(--dark);font-family:'Nunito',sans-serif;
    overflow:hidden;width:100vw;height:100vh;
    display:flex;flex-direction:column;align-items:center;
    color:var(--cream);user-select:none;
  }
  #canvas-wrap{position:absolute;inset:0;z-index:0}
  #canvas-wrap canvas{width:100%!important;height:100%!important}

  /* ── HUD ── */
  #hud{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 16px;z-index:10;pointer-events:none;gap:8px;
  }
  .hud-card{
    background:rgba(13,27,42,0.88);backdrop-filter:blur(12px);
    border:1.5px solid rgba(255,209,102,0.3);border-radius:16px;
    padding:8px 14px;display:flex;align-items:center;gap:8px;
    pointer-events:auto;min-width:90px;
  }
  .hud-icon{font-size:20px;line-height:1}
  .hud-info{display:flex;flex-direction:column}
  .hud-label{font-size:9px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.5px}
  .hud-val{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold);line-height:1}

  /* level bar */
  #lvl-bar{
    position:absolute;top:70px;left:50%;transform:translateX(-50%);
    width:min(280px,80vw);z-index:10;
  }
  .lvl-track{
    background:rgba(13,27,42,0.8);border:1.5px solid rgba(255,209,102,0.3);
    border-radius:50px;padding:4px 10px;
    display:flex;align-items:center;gap:8px;
  }
  .lvl-text{font-family:'Fredoka One';font-size:13px;color:var(--gold);white-space:nowrap}
  .lvl-bg{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:50px;overflow:hidden}
  .lvl-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--gold));border-radius:50px;transition:width .5s ease}

  /* ── DICE AREA ── */
  #dice-area{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:10px;
    padding:16px;z-index:10;width:100%;max-width:400px;
  }
  #dice-canvas-wrap{width:120px;height:120px;position:relative}
  #dice-canvas-wrap canvas{width:100%!important;height:100%!important}
  #roll-btn{
    font-family:'Fredoka One',cursive;font-size:22px;
    background:linear-gradient(135deg,var(--coral),#c0392b);
    color:white;border:none;border-radius:50px;
    padding:14px 48px;cursor:pointer;
    box-shadow:0 6px 24px rgba(239,71,111,.5),0 0 0 3px rgba(239,71,111,.2);
    transition:transform .1s,box-shadow .1s;letter-spacing:.5px;
    position:relative;overflow:hidden;
  }
  #roll-btn::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
    border-radius:50px;
  }
  #roll-btn:active{transform:scale(.95)}
  #roll-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  #dice-result{
    font-family:'Fredoka One';font-size:28px;color:var(--gold);
    text-shadow:0 2px 12px rgba(255,209,102,.6);
    min-height:36px;text-align:center;
  }

  /* ── POPUP ── */
  #popup-overlay{
    position:absolute;inset:0;z-index:50;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  #popup-overlay.show{opacity:1;pointer-events:auto}
  #popup{
    background:linear-gradient(145deg,#1a2d4a,#0d1b2a);
    border:2px solid var(--gold);border-radius:28px;
    padding:32px 28px;text-align:center;max-width:320px;width:90%;
    transform:scale(.7);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    position:relative;overflow:hidden;
  }
  #popup-overlay.show #popup{transform:scale(1)}
  .popup-glow{
    position:absolute;inset:-40px;
    background:radial-gradient(circle at center,rgba(255,209,102,.12),transparent 70%);
    pointer-events:none;
  }
  #popup-icon{font-size:64px;margin-bottom:8px;display:block;animation:iconBounce .6s ease}
  #popup-title{font-family:'Fredoka One';font-size:28px;color:var(--gold);margin-bottom:6px}
  #popup-msg{font-size:15px;opacity:.8;line-height:1.5;margin-bottom:20px}
  #popup-btn{
    font-family:'Fredoka One';font-size:18px;
    background:linear-gradient(135deg,var(--mint),#04a67e);
    color:white;border:none;border-radius:50px;
    padding:12px 40px;cursor:pointer;
    box-shadow:0 4px 16px rgba(6,214,160,.4);
    transition:transform .1s;
  }
  #popup-btn:active{transform:scale(.95)}

  /* ── LANDMARK PANEL ── */
  #lm-panel{
    position:absolute;right:0;top:50%;transform:translateY(-50%);
    z-index:10;display:flex;flex-direction:column;gap:6px;padding:8px;
  }
  .lm-card{
    background:rgba(13,27,42,.85);border:1.5px solid rgba(255,255,255,.15);
    border-radius:14px;padding:8px 10px;min-width:100px;
    font-size:11px;transition:border-color .3s;
  }
  .lm-card.owned{border-color:rgba(255,209,102,.5)}
  .lm-card .lm-name{font-weight:700;font-size:12px;color:var(--cream)}
  .lm-card .lm-lvl{color:var(--gold);font-family:'Fredoka One';font-size:14px}
  .lm-stars{color:var(--gold);font-size:10px;letter-spacing:1px}

  /* ANIMATIONS */
  @keyframes iconBounce{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}
  .float-label{
    position:absolute;pointer-events:none;font-family:'Fredoka One';
    font-size:22px;color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,.5);
    z-index:60;animation:floatUp 1.2s ease forwards;
  }

  /* Tile info */
  #tile-info{
    position:absolute;bottom:220px;left:50%;transform:translateX(-50%);
    background:rgba(13,27,42,.85);border:1.5px solid rgba(255,209,102,.3);
    border-radius:14px;padding:8px 20px;font-size:13px;font-weight:700;
    z-index:10;opacity:0;transition:opacity .3s;pointer-events:none;
    white-space:nowrap;
  }
  #tile-info.show{opacity:1}

  @media(max-width:480px){
    .lm-panel{display:none}
    #roll-btn{font-size:18px;padding:12px 36px}
  }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-card">
    <span class="hud-icon">🪙</span>
    <div class="hud-info">
      <span class="hud-label">Coins</span>
      <span class="hud-val" id="coins-val">500</span>
    </div>
  </div>
  <div class="hud-card">
    <span class="hud-icon">🎲</span>
    <div class="hud-info">
      <span class="hud-label">Turn</span>
      <span class="hud-val" id="turn-val">1</span>
    </div>
  </div>
  <div class="hud-card">
    <span class="hud-icon">⚡</span>
    <div class="hud-info">
      <span class="hud-label">Score</span>
      <span class="hud-val" id="score-val">0</span>
    </div>
  </div>
</div>

<!-- Level Bar -->
<div id="lvl-bar">
  <div class="lvl-track">
    <span class="lvl-text" id="lvl-text">Lv.1</span>
    <div class="lvl-bg"><div class="lvl-fill" id="lvl-fill" style="width:0%"></div></div>
    <span class="lvl-text" id="xp-text">0/100</span>
  </div>
</div>

<!-- Landmark Panel -->
<div id="lm-panel"></div>

<!-- Tile info -->
<div id="tile-info"></div>

<!-- Dice & Roll -->
<div id="dice-area">
  <div id="dice-result"></div>
  <div id="dice-canvas-wrap"></div>
  <button id="roll-btn">🎲 ROLL DICE</button>
</div>

<!-- Popup -->
<div id="popup-overlay">
  <div id="popup">
    <div class="popup-glow"></div>
    <span id="popup-icon">🎉</span>
    <div id="popup-title">Jackpot!</div>
    <div id="popup-msg">You got something amazing!</div>
    <button id="popup-btn">Collect!</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
const GS = {
  coins: 500, xp: 0, level: 1, score: 0, turn: 1,
  pos: 0, rolling: false, animating: false,
  landmarks: [
    { name:'Café Sol', icon:'☕', lvl:0, cost:200, owned:false },
    { name:'Sky Tower', icon:'🗼', lvl:0, cost:400, owned:false },
    { name:'Luna Park', icon:'🎡', lvl:0, cost:600, owned:false },
    { name:'Crystal Mall', icon:'💎', lvl:0, cost:800, owned:false },
  ]
};

const XP_PER_LVL = 100;

// ─────────────────────────────────────────────
//  BOARD DEFINITION  (28 tiles)
// ─────────────────────────────────────────────
const TILE_TYPES = [
  { type:'start',    icon:'🏠', label:'Home Base', color:0x06D6A0 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'landmark', icon:'🏗️', label:'Café Sol',    color:0x7B2FBE, lmIdx:0 },
  { type:'chest',    icon:'📦', label:'Treasure',    color:0xFF9A3C },
  { type:'lucky',    icon:'🍀', label:'Lucky Spin',  color:0x06D6A0 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'tax',      icon:'💸', label:'Tax!',        color:0xEF476F },
  { type:'landmark', icon:'🗼', label:'Sky Tower',   color:0x7B2FBE, lmIdx:1 },
  { type:'mystery',  icon:'❓', label:'Mystery Box', color:0x118AB2 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'lucky',    icon:'🍀', label:'Lucky Spin',  color:0x06D6A0 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'chest',    icon:'📦', label:'Treasure',    color:0xFF9A3C },
  { type:'tax',      icon:'💸', label:'Tax!',        color:0xEF476F },
  { type:'landmark', icon:'🎡', label:'Luna Park',   color:0x7B2FBE, lmIdx:2 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'mystery',  icon:'❓', label:'Mystery Box', color:0x118AB2 },
  { type:'lucky',    icon:'🍀', label:'Lucky Spin',  color:0x06D6A0 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'chest',    icon:'📦', label:'Treasure',    color:0xFF9A3C },
  { type:'tax',      icon:'💸', label:'Tax!',        color:0xEF476F },
  { type:'landmark', icon:'💎', label:'Crystal Mall',color:0x7B2FBE, lmIdx:3 },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'lucky',    icon:'🍀', label:'Lucky Spin',  color:0x06D6A0 },
  { type:'mystery',  icon:'❓', label:'Mystery Box', color:0x118AB2 },
  { type:'chest',    icon:'📦', label:'Treasure',    color:0xFF9A3C },
  { type:'coin',     icon:'🪙', label:'Coin Bonus',  color:0xFFD166 },
  { type:'mystery',  icon:'❓', label:'Mystery Box', color:0x118AB2 },
];
const NUM_TILES = TILE_TYPES.length;

// ─────────────────────────────────────────────
//  BOARD GEOMETRY
// ─────────────────────────────────────────────
function getTilePosition(idx) {
  // Rectangular loop: 7 top, 5 right, 7 bottom, 5 left → 24... adjust for 28
  const total = NUM_TILES;
  const perSide = Math.ceil(total / 4);
  const t = idx / total;
  const angle = t * Math.PI * 2 - Math.PI / 2;
  const rx = 3.8, ry = 2.6;
  return {
    x: Math.cos(angle) * rx,
    z: Math.sin(angle) * ry
  };
}

// ─────────────────────────────────────────────
//  THREE.JS BOARD SCENE
// ─────────────────────────────────────────────
const boardScene = new THREE.Scene();
const boardCam   = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
boardCam.position.set(0, 9.2, 7.4);
boardCam.lookAt(0, 0, 0);

// Soft depth fog for atmosphere / HD depth cueing
boardScene.fog = new THREE.Fog(0x060c16, 9, 22);

const boardRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
boardRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
boardRenderer.shadowMap.enabled = true;
boardRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
boardRenderer.outputEncoding = THREE.sRGBEncoding;
boardRenderer.toneMapping = THREE.ACESFilmicToneMapping;
boardRenderer.toneMappingExposure = 1.15;
document.getElementById('canvas-wrap').appendChild(boardRenderer.domElement);

function resizeBoard() {
  const w = window.innerWidth, h = window.innerHeight;
  boardRenderer.setSize(w, h);
  boardCam.aspect = w / h;
  boardCam.updateProjectionMatrix();
}
resizeBoard();
window.addEventListener('resize', resizeBoard);

// ── Generated env map (soft gradient) for PBR reflections ──
function makeEnvTexture() {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0, '#2a4470');
  grad.addColorStop(0.45, '#0f2138');
  grad.addColorStop(1, '#050b14');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  // soft horizon glow band
  const glow = ctx.createRadialGradient(size/2, size*0.5, 0, size/2, size*0.5, size*0.7);
  glow.addColorStop(0, 'rgba(255,209,102,0.18)');
  glow.addColorStop(1, 'rgba(255,209,102,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}
const envTex = makeEnvTexture();
boardScene.environment = envTex;

// Sky backdrop sphere (gives the void real depth instead of flat black)
const skyGeo = new THREE.SphereGeometry(40, 32, 18);
const skyMat = new THREE.MeshBasicMaterial({ map: envTex, side: THREE.BackSide, fog: false });
const sky = new THREE.Mesh(skyGeo, skyMat);
boardScene.add(sky);

// ── Lighting rig: key / fill / rim + sky bounce ──
const hemiLight = new THREE.HemisphereLight(0x6f9fd6, 0x0a1424, 0.55);
boardScene.add(hemiLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.22);
boardScene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0xfff3da, 1.6);
dirLight.position.set(6, 13, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -9; dirLight.shadow.camera.right = 9;
dirLight.shadow.camera.top = 9; dirLight.shadow.camera.bottom = -9;
dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 30;
dirLight.shadow.bias = -0.0015;
dirLight.shadow.radius = 3;
boardScene.add(dirLight);

const fillLight = new THREE.PointLight(0xFFD166, 1.1, 22, 2);
fillLight.position.set(-4.5, 4, -4);
boardScene.add(fillLight);

const rimLight = new THREE.PointLight(0x7B2FBE, 0.7, 18, 2);
rimLight.position.set(4, 3, -5);
boardScene.add(rimLight);

// ── Ground: layered PBR disc with soft sheen + reflective ring ──
const groundGeo = new THREE.CircleGeometry(8.4, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0d2038, roughness: 0.5, metalness: 0.25,
  envMapIntensity: 0.7
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
boardScene.add(ground);

// Subtle two-tone inlay ring under the board for HD layered look
const inlayGeo = new THREE.RingGeometry(4.1, 5.4, 64);
const inlayMat = new THREE.MeshStandardMaterial({
  color: 0x132A45, roughness: 0.5, metalness: 0.3, transparent: true, opacity: 0.85
});
const inlay = new THREE.Mesh(inlayGeo, inlayMat);
inlay.rotation.x = -Math.PI / 2;
inlay.position.y = 0.005;
boardScene.add(inlay);

// Grid dots with subtle emissive glint
const dotMat = new THREE.MeshStandardMaterial({ color: 0x2a4a72, emissive: 0x16314f, emissiveIntensity: 0.6, roughness: 0.6 });
for (let i = -7; i <= 7; i++) {
  for (let j = -5; j <= 5; j++) {
    if (Math.hypot(i*0.9, j*0.9) > 8) continue;
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 6), dotMat);
    dot.position.set(i * 0.9, 0.012, j * 0.9);
    boardScene.add(dot);
  }
}

// Build tile meshes
const tileMeshes = [];
const tileLabels = [];
const buildingMeshes = [];

// Rounded box geometry helper for HD beveled tiles (self-contained, no extra deps)
function roundedBoxGeo(w, h, d, r = 0.05, seg = 3) {
  r = Math.min(r, w/2, h/2, d/2);
  const shape = new THREE.Shape();
  const x = -w/2, y = -d/2;
  shape.moveTo(x, y + r);
  shape.lineTo(x, y + d - r);
  shape.quadraticCurveTo(x, y + d, x + r, y + d);
  shape.lineTo(x + w - r, y + d);
  shape.quadraticCurveTo(x + w, y + d, x + w, y + d - r);
  shape.lineTo(x + w, y + r);
  shape.quadraticCurveTo(x + w, y, x + w - r, y);
  shape.lineTo(x + r, y);
  shape.quadraticCurveTo(x, y, x, y + r);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: h, bevelEnabled: true, bevelThickness: r * 0.6, bevelSize: r * 0.6,
    bevelSegments: Math.max(2, seg), curveSegments: Math.max(2, seg), steps: 1
  });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, h / 2, 0);
  geo.computeVertexNormals();
  return geo;
}

TILE_TYPES.forEach((tile, i) => {
  const pos = getTilePosition(i);
  const geo = roundedBoxGeo(0.74, 0.2, 0.54, 0.06, 3);
  const mat = new THREE.MeshStandardMaterial({
    color: tile.color, roughness: 0.45, metalness: 0.25,
    emissive: tile.color, emissiveIntensity: 0.12,
    envMapIntensity: 1.0
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, 0.1, pos.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  boardScene.add(mesh);
  tileMeshes.push(mesh);

  // Beveled rim (slightly larger, darker base under the tile for depth)
  const baseGeo = new THREE.BoxGeometry(0.82, 0.06, 0.62);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x081222, roughness: 0.7, metalness: 0.1 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.set(pos.x, 0.02, pos.z);
  base.receiveShadow = true;
  boardScene.add(base);

  // Glow top face
  const glowGeo = new THREE.PlaneGeometry(0.66, 0.46);
  const glowMat = new THREE.MeshBasicMaterial({
    color: tile.color, transparent: true, opacity: 0.35
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.set(pos.x, 0.205, pos.z);
  boardScene.add(glow);

  // 3D mini-building rising from landmark / start tiles for real depth
  if (tile.type === 'landmark' || tile.type === 'start') {
    const bGroup = new THREE.Group();
    const isStart = tile.type === 'start';
    const bw = isStart ? 0.46 : 0.34;
    const bh = isStart ? 0.55 : 0.5;
    const storyMat = new THREE.MeshStandardMaterial({
      color: isStart ? 0x0e8f6e : 0x9b59d9,
      roughness: 0.35, metalness: 0.4,
      emissive: isStart ? 0x06D6A0 : 0x7B2FBE, emissiveIntensity: 0.25
    });
    const storyGeo = new THREE.BoxGeometry(bw, bh, bw);
    const story = new THREE.Mesh(storyGeo, storyMat);
    story.position.y = 0.2 + bh / 2;
    story.castShadow = true;
    bGroup.add(story);

    // roof cap
    const roofMat = new THREE.MeshStandardMaterial({ color: 0xFFD166, roughness: 0.3, metalness: 0.6, emissive: 0xFFD166, emissiveIntensity: 0.4 });
    const roofGeo = isStart ? new THREE.ConeGeometry(bw*0.55, 0.22, 6) : new THREE.BoxGeometry(bw*0.6, 0.08, bw*0.6);
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = 0.2 + bh + (isStart ? 0.11 : 0.04);
    roof.castShadow = true;
    bGroup.add(roof);

    bGroup.position.set(pos.x, 0, pos.z);
    bGroup.scale.set(0.001, 0.001, 0.001); // start collapsed; grows when owned/visited
    boardScene.add(bGroup);
    buildingMeshes[i] = { group: bGroup, built: isStart, targetScale: isStart ? 1 : 0.001 };
    if (isStart) bGroup.scale.set(1, 1, 1);
  }
});

// Connecting path (slightly inset, soft metallic strip)
TILE_TYPES.forEach((_, i) => {
  const a = getTilePosition(i);
  const b = getTilePosition((i + 1) % NUM_TILES);
  const mid = { x: (a.x + b.x) / 2, z: (a.z + b.z) / 2 };
  const dx = b.x - a.x, dz = b.z - a.z;
  const len = Math.sqrt(dx * dx + dz * dz);
  const pathGeo = new THREE.BoxGeometry(len - 0.05, 0.045, 0.16);
  const pathMat = new THREE.MeshStandardMaterial({ color: 0x1e3a5f, roughness: 0.4, metalness: 0.5, envMapIntensity: 0.6 });
  const path = new THREE.Mesh(pathGeo, pathMat);
  path.position.set(mid.x, 0.022, mid.z);
  path.rotation.y = -Math.atan2(dz, dx);
  path.receiveShadow = true;
  boardScene.add(path);
});

// Highlight tile
let highlightTile = null;
function highlightAt(idx) {

  tileMeshes[idx].scale.set(1.08, 1.4, 1.08);

// Particles — glowing HD bits with additive-style emissive pop
const particles = [];
function spawnParticles(x, z, color = 0xFFD166, count = 20) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.055, 8, 8);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 1.4,
      roughness: 0.2, metalness: 0.3, transparent: true
    });
    const mesh = new THREE.Mesh(geo, mat);
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.04 + Math.random() * 0.06;
    mesh.position.set(x, 0.4, z);
    boardScene.add(mesh);
    particles.push({
      mesh, vx: Math.cos(angle) * speed,
      vy: 0.08 + Math.random() * 0.06,
      vz: Math.sin(angle) * speed,
      life: 1.0
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vy -= 0.004;
    p.life -= 0.025;
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      boardScene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }
}

// Camera orbit
let camAngle = 0;
function animateBoard() {
  requestAnimationFrame(animateBoard);

  // Gentle token bob (head)
  head.position.y = 0.32 + Math.sin(Date.now() * 0.003) * 0.04;
  visor.position.y = head.position.y - 0.02;
  tokenGroup.rotation.y += 0.01;

  // Ring pulse
  const s = 1 + Math.sin(Date.now() * 0.005) * 0.1;
  ring.scale.set(s, s, s);
  ring.material.opacity = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;

  // Tile pulse on highlighted
  if (highlightTile !== null) {
    const sc = 1.08 + Math.sin(Date.now() * 0.006) * 0.05;
    tileMeshes[highlightTile].scale.set(sc, 1.4, sc);
  }

  // Buildings grow smoothly when constructed
  buildingMeshes.forEach(b => {
    if (!b) return;
    const cur = b.group.scale.x;
    const next = cur + (b.targetScale - cur) * 0.12;
    b.group.scale.set(next, next, next);
    b.group.rotation.y += 0.002;
  });

  fillLight.intensity = 0.9 + Math.sin(Date.now() * 0.002) * 0.25;
  rimLight.intensity = 0.6 + Math.sin(Date.now() * 0.0017 + 1) * 0.2;

  updateParticles();
  boardRenderer.render(boardScene, boardCam);
}

const diceScene    = new THREE.Scene();
const diceCam      = new THREE.PerspectiveCamera(50, 1, 0.1, 50);
diceCam.position.set(0.6, 1.4, 3.3);
diceCam.lookAt(0, 0, 0);

const diceRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
diceRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
diceRenderer.setSize(120, 120);
diceRenderer.shadowMap.enabled = true;
diceRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
diceRenderer.outputEncoding = THREE.sRGBEncoding;
diceRenderer.toneMapping = THREE.ACESFilmicToneMapping;
diceRenderer.toneMappingExposure = 1.2;
document.getElementById('dice-canvas-wrap').appendChild(diceRenderer.domElement);
diceScene.environment = envTex;

const diceAmbient = new THREE.AmbientLight(0xffffff, 0.35);
diceScene.add(diceAmbient);
const diceDirLight = new THREE.DirectionalLight(0xfff3da, 1.8);

const diceRim = new THREE.PointLight(0xFFD166, 1.0, 8);

// invisible shadow-catcher plane beneath the dice
const diceFloorGeo = new THREE.PlaneGeometry(6, 6);
const diceFloorMat = new THREE.ShadowMaterial({ opacity: 0.35 });
const diceFloor = new THREE.Mesh(diceFloorGeo, diceFloorMat);
diceFloor.rotation.x = -Math.PI / 2;
diceFloor.position.y = -0.85;
diceFloor.receiveShadow = true;
diceScene.add(diceFloor);

// Dice cube — sharp HD faces with soft inner shadow + PBR finish
const diceGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
const diceMats = [1,2,3,4,5,6].map(n => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 256, 256);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#f0ecf7');
  ctx.fillStyle = grad;
  ctx.roundRect(0, 0, 256, 256, 36);
  ctx.fill();
  ctx.fillStyle = '#241b3a';
  const dots = {
    1:[[128,128]],
    2:[[64,64],[192,192]],
    3:[[64,64],[128,128],[192,192]],
    4:[[64,64],[192,64],[64,192],[192,192]],
    5:[[64,64],[192,64],[128,128],[64,192],[192,192]],
    6:[[64,64],[192,64],[64,128],[192,128],[64,192],[192,192]]
  };
  dots[n].forEach(([x,y])=>{
    const dg = ctx.createRadialGradient(x-4,y-4,2,x,y,24);
    dg.addColorStop(0,'#3a2c5c'); dg.addColorStop(1,'#1a1330');
    ctx.fillStyle = dg;
    ctx.beginPath();ctx.arc(x,y,24,0,Math.PI*2);ctx.fill();
  });
  const tex = new THREE.CanvasTexture(canvas);
  tex.encoding = THREE.sRGBEncoding;
  return new THREE.MeshStandardMaterial({ map: tex, roughness: 0.25, metalness: 0.08, envMapIntensity: 1.1 });
});
const diceMesh = new THREE.Mesh(diceGeo, diceMats);
diceMesh.castShadow = true;
diceMesh.receiveShadow = true;
diceScene.add(diceMesh);

let diceRolling = false;
let diceTarget = { x: 0, y: 0, z: 0 };
let diceVel = { x: 0, y: 0, z: 0 };

function rollDiceAnim() {
  requestAnimationFrame(rollDiceAnim);
  if (diceRolling) {
    diceMesh.rotation.x += diceVel.x;
    diceMesh.rotation.y += diceVel.y;
    diceMesh.rotation.z += diceVel.z;
    diceVel.x *= 0.97;
    diceVel.y *= 0.97;
    diceVel.z *= 0.97;
  } else {
    diceMesh.rotation.x += (diceTarget.x - diceMesh.rotation.x) * 0.1;
    diceMesh.rotation.y += (diceTarget.y - diceMesh.rotation.y) * 0.1;
  }
  diceRenderer.render(diceScene, diceCam);
}
rollDiceAnim();

// Face rotations for each dice value
const FACE_ROTS = {
  1: { x: 0,            y: 0 },
  2: { x: Math.PI/2,   y: 0 },
  3: { x: 0,            y: -Math.PI/2 },
  4: { x: 0,            y: Math.PI/2 },
  5: { x: -Math.PI/2,  y: 0 },
  6: { x: Math.PI,      y: 0 },
};

function triggerDiceRoll(value) {
  return new Promise(resolve => {
    diceVel = {
      x: (Math.random() - 0.5) * 0.5,
      y: (Math.random() - 0.5) * 0.5,
      z: (Math.random() - 0.5) * 0.3
    };
    diceRolling = true;
    setTimeout(() => {
      diceRolling = false;
      diceTarget = FACE_ROTS[value];
      setTimeout(resolve, 600);
    }, 900);
  });
}

function updateHUD() {
  document.getElementById('coins-val').textContent = GS.coins.toLocaleString();
  document.getElementById('turn-val').textContent  = GS.turn;
  document.getElementById('score-val').textContent = GS.score;
  const pct = Math.min((GS.xp % XP_PER_LVL) / XP_PER_LVL * 100, 100);
  document.getElementById('lvl-fill').style.width  = pct + '%';
  document.getElementById('lvl-text').textContent  = 'Lv.' + GS.level;
  document.getElementById('xp-text').textContent   = (GS.xp % XP_PER_LVL) + '/' + XP_PER_LVL;
}

function addXP(amount) {
  GS.xp += amount;
  while (GS.xp >= GS.level * XP_PER_LVL) GS.level++;
  updateHUD();
}

function showTileInfo(label) {
  const el = document.getElementById('tile-info');
  el.textContent = label;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function floatLabel(text, clientX, clientY) {
  const el = document.createElement('div');
  el.className = 'float-label';
  el.textContent = text;
  el.style.left = (clientX || window.innerWidth / 2) + 'px';
  el.style.top  = (clientY || window.innerHeight * 0.6) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// Popup
function showPopup(icon, title, msg, btnText='Collect!') {
  return new Promise(resolve => {
    document.getElementById('popup-icon').textContent  = icon;
    document.getElementById('popup-title').textContent = title;
    document.getElementById('popup-msg').textContent   = msg;
    document.getElementById('popup-btn').textContent   = btnText;
    const overlay = document.getElementById('popup-overlay');
    overlay.classList.add('show');
    const handler = () => {
      overlay.classList.remove('show');
      document.getElementById('popup-btn').removeEventListener('click', handler);
      resolve();
    };
    document.getElementById('popup-btn').addEventListener('click', handler);
  });
}

// Landmark panel

  const panel = document.getElementById('lm-panel');
  panel.innerHTML = '';
  GS.landmarks.forEach((lm, i) => {

// ─────────────────────────────────────────────
//  LUCKY SPIN
// ─────────────────────────────────────────────
const SPIN_PRIZES = [
  { label:'50 Coins', coins:50, icon:'🪙' },
  { label:'100 Coins', coins:100, icon:'💰' },
  { label:'200 Coins', coins:200, icon:'💵' },
  { label:'5 XP', xp:5, icon:'⚡' },
  { label:'20 XP', xp:20, icon:'🌟' },
  { label:'Nothing…', coins:0, icon:'😢' },
];

async function doLuckySpin() {
  const prize = SPIN_PRIZES[Math.floor(Math.random() * SPIN_PRIZES.length)];
  if (prize.coins) {
    GS.coins += prize.coins;
    GS.score += prize.coins;
  }
  if (prize.xp) addXP(prize.xp);
  updateHUD();
  await showPopup('🍀', 'Lucky Spin!', `${prize.icon} ${prize.label}`, 'Awesome!');
}

// ─────────────────────────────────────────────
//  TILE EVENTS
// ─────────────────────────────────────────────
async function handleTileEvent(idx) {
  const tile   = TILE_TYPES[idx];
  const tPos   = getTilePosition(idx);
  const pColor = tile.color;

  spawnParticles(tPos.x, tPos.z, pColor, 16);
  showTileInfo(tile.icon + ' ' + tile.label);

  switch (tile.type) {
    case 'start': {
      const bonus = 200;
      GS.coins += bonus;
      GS.score += bonus;
      addXP(10);
      floatLabel('+200🪙');
      await showPopup('🏠', 'Home Base!', `Passed start! +${bonus} coins bonus!`);
      break;
    }
    case 'coin': {
      const amt = [50,75,100,150][Math.floor(Math.random()*4)];
      GS.coins += amt;
      GS.score += amt;
      addXP(5);
      floatLabel(`+${amt}🪙`);
      spawnParticles(tPos.x, tPos.z, 0xFFD166, 24);
      await showPopup('🪙', 'Coin Bonus!', `You found ${amt} coins shining on the ground!`);
      break;
    }
    case 'chest': {
      const rewards = [
        { coins:300, xp:15, label:'Grand Chest' },
        { coins:150, xp:8,  label:'Silver Chest' },
        { coins:500, xp:25, label:'LEGENDARY Chest ✨' },
        { coins:80,  xp:5,  label:'Wooden Chest' },
      ];
      const r = rewards[Math.floor(Math.random()*rewards.length)];
      GS.coins += r.coins;
      GS.score += r.coins;
      addXP(r.xp);
      floatLabel(`+${r.coins}🪙`);
      spawnParticles(tPos.x, tPos.z, 0xFF9A3C, 30);
      await showPopup('📦', r.label, `+${r.coins} coins & +${r.xp} XP!`);
      break;
    }
    case 'lucky':
      await doLuckySpin();
      break;
    case 'tax': {
      const tax = Math.min(GS.coins, Math.floor(50 + Math.random()*100));
      GS.coins = Math.max(0, GS.coins - tax);
      floatLabel(`-${tax}💸`);
      spawnParticles(tPos.x, tPos.z, 0xEF476F, 14);
      await showPopup('💸', 'Tax Time!', `The city collected ${tax} coins from you. Ouch!`, 'OK…');
      break;
    }
    case 'mystery': {
      const outcomes = [
        { fn: async()=>{ const a=200; GS.coins+=a; GS.score+=a; addXP(10); floatLabel(`+${a}🪙`); await showPopup('❓','Mystery Box!','JACKPOT! +200 coins!'); } },
        { fn: async()=>{ const a=50; GS.coins=Math.max(0,GS.coins-a); floatLabel(`-${a}💸`); await showPopup('❓','Mystery Box!','A banana peel… -50 coins!','Oof!'); } },
        { fn: async()=>{ addXP(30); await showPopup('❓','Mystery Box!','Triple XP surge! +30 XP! ⚡','Woah!'); } },
        { fn: async()=>{ await doLuckySpin(); } },
        { fn: async()=>{ const a=100; GS.coins+=a; GS.score+=a; floatLabel(`+${a}🪙`); await showPopup('❓','Mystery Box!','+100 coin windfall!'); } },
      ];
      await outcomes[Math.floor(Math.random()*outcomes.length)].fn();
      break;
    }
    case 'landmark': {
      const lm  = GS.landmarks[tile.lmIdx];
      const upgCost = lm.cost + lm.lvl * 200;
      if (!lm.owned) {
        if (GS.coins >= lm.cost) {
          GS.coins -= lm.cost;
          lm.owned = true;
          lm.lvl   = 1;
          GS.score += 500;
          addXP(30);
          spawnParticles(tPos.x, tPos.z, 0x7B2FBE, 40);
          floatLabel('🏗️ Built!');
          if (buildingMeshes[idx]) buildingMeshes[idx].targetScale = 1;
          await showPopup(lm.icon, `${lm.name} Built!`, `Your landmark is now open! Earns income each lap. Cost: ${lm.cost}🪙`);
        } else {
          await showPopup(lm.icon, lm.name, `You need ${lm.cost - GS.coins} more coins to build this landmark.`, 'Got it');
        }
      } else if (lm.lvl < 5) {
        if (GS.coins >= upgCost) {
          GS.coins -= upgCost;
          lm.lvl++;
          GS.score += 300 * lm.lvl;
          addXP(20 * lm.lvl);
          spawnParticles(tPos.x, tPos.z, 0x06D6A0, 40);
          floatLabel(`⬆️ Lv.${lm.lvl}`);
          if (buildingMeshes[idx]) buildingMeshes[idx].targetScale = 1 + lm.lvl * 0.18;
          await showPopup(lm.icon, `${lm.name} Upgraded!`, `Now Level ${lm.lvl}! Income increased by ${lm.lvl * 30}%`, 'Sweet!');
        } else {
          // Collect income
          const income = lm.lvl * 40;
          GS.coins += income;
          GS.score += income;
          addXP(5);
          floatLabel(`+${income}🪙`);
          spawnParticles(tPos.x, tPos.z, 0xFFD166, 20);
          await showPopup(lm.icon, `${lm.name} Income!`, `Your Lv.${lm.lvl} landmark earned you ${income} coins!`);
        }
      } else {
        const income = lm.lvl * 60;
        GS.coins += income;
        GS.score += income;
        addXP(10);
        floatLabel(`+${income}🪙`);
        spawnParticles(tPos.x, tPos.z, 0xFFD166, 30);
        await showPopup(lm.icon, `${lm.name} MAX!`, `Max Level! Collected ${income} coins!`);
      }
      renderLandmarks();
      break;
    }
  }
  updateHUD();
}

// ─────────────────────────────────────────────
//  MOVE TOKEN (animated step by step)
// ─────────────────────────────────────────────
function moveToken(fromIdx, toIdx) {
  return new Promise(resolve => {
    const steps = [];
    let cur = fromIdx;
    const target = (fromIdx < toIdx) ? toIdx : toIdx + NUM_TILES;
    for (let i = fromIdx + 1; i <= target; i++) {
      steps.push(i % NUM_TILES);
    }
    let s = 0;
    function nextStep() {
      if (s >= steps.length) { resolve(); return; }
      const idx = steps[s++];
      const pos  = getTilePosition(idx);
      // animate smoothly
      const startX = tokenGroup.position.x;
      const startZ = tokenGroup.position.z;
      const t0 = Date.now();
      const dur = 220;
      function anim() {
        const t = Math.min((Date.now() - t0) / dur, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        tokenGroup.position.x = startX + (pos.x - startX) * ease;
        tokenGroup.position.z = startZ + (pos.z - startZ) * ease;
        tokenGroup.position.y = 0.3 + Math.sin(t * Math.PI) * 0.4;
        ring.position.x = tokenGroup.position.x;
        ring.position.z = tokenGroup.position.z;
        if (t < 1) requestAnimationFrame(anim);
        else nextStep();
      }
      anim();
    }
    nextStep();
  });
}

// ─────────────────────────────────────────────
//  ROLL BUTTON
// ─────────────────────────────────────────────
document.getElementById('roll-btn').addEventListener('click', async () => {
  if (GS.rolling || GS.animating) return;
  GS.rolling = true;
  GS.animating = true;
  const btn = document.getElementById('roll-btn');
  btn.disabled = true;

  const diceVal = Math.ceil(Math.random() * 6);
  document.getElementById('dice-result').textContent = '';

  await triggerDiceRoll(diceVal);

  document.getElementById('dice-result').textContent = `🎲 You rolled a ${diceVal}!`;

  const fromPos = GS.pos;
  const toPos   = (GS.pos + diceVal) % NUM_TILES;
  const passedStart = (GS.pos + diceVal) >= NUM_TILES;

  // Move
  await moveToken(fromPos, toPos);
  GS.pos = toPos;
  highlightAt(toPos);

  if (passedStart && toPos !== 0) {
    GS.coins += 150;
    GS.score += 150;
    floatLabel('🏠 +150🪙');
    updateHUD();
  }

  GS.turn++;
  updateHUD();

  // Handle event
  await handleTileEvent(GS.pos);

  GS.rolling  = false;
  GS.animating = false;
  btn.disabled = false;
  document.getElementById('dice-result').textContent = '';
  renderLandmarks();
});
